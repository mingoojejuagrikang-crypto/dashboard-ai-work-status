<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0b0c0e">
<title>대시보드_AI_작업현황</title>
<style>
  /* ===== 디자인 토큰 (눈 피로 저감 블랙 테마) ===== */
  :root{
    --bg:#0b0c0e;          /* 순수 검정이 아닌 아주 어두운 무채색 */
    --bg-2:#101215;        /* 살짝 밝은 바탕 */
    --surface:#15171a;     /* 카드 표면 */
    --surface-2:#1a1d21;   /* 카드 내부 강조 표면 */
    --border:#26292e;      /* 은은한 경계 */
    --border-soft:#1e2125;
    --text:#c9ced6;        /* 본문(순백 금지) */
    --text-dim:#8b929c;    /* 보조 텍스트 */
    --text-faint:#646a73;  /* 더 낮은 명도 */
    --blue:#5b8def;
    --green:#54b585;
    --amber:#d9a441;
    --red:#e0625e;
    --radius:14px;
    --radius-sm:9px;
    --ease:cubic-bezier(.22,.61,.36,1);
    /* safe-area insets */
    --sat:env(safe-area-inset-top);
    --sab:env(safe-area-inset-bottom);
    --sal:env(safe-area-inset-left);
    --sar:env(safe-area-inset-right);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro KR","Apple SD Gothic Neo","Pretendard","Malgun Gothic",system-ui,sans-serif;
    font-size:18px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow:hidden;            /* 기본 무스크롤 — 상세에서만 개별 스크롤 */
    overscroll-behavior:none;
  }
  /* 아주 옅은 따뜻한 오버레이로 블루라이트 체감 저감 (과하지 않게) */
  body::after{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:9999;
    background:rgba(255,170,90,.025);
  }

  button{font-family:inherit;color:inherit;cursor:pointer;border:none;background:none;}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:#2c3036;border-radius:8px;border:2px solid var(--bg);}
  ::-webkit-scrollbar-track{background:transparent;}

  #app{height:100dvh;width:100%;position:relative;overflow:hidden;}

  /* ============ 홈 (무스크롤) ============ */
  .home{
    height:100dvh;display:flex;flex-direction:column;
    padding:calc(var(--sat) + 18px) calc(var(--sar) + 22px) calc(var(--sab) + 18px) calc(var(--sal) + 22px);
    gap:16px;
  }
  .hero{
    flex:0 0 auto;display:flex;align-items:center;gap:18px;
    padding-bottom:14px;border-bottom:1px solid var(--border-soft);
  }
  .hero-left{min-width:0;flex:1;}
  .hero h1{
    margin:0;font-size:clamp(22px,2.8vw,30px);font-weight:650;letter-spacing:-.01em;
    color:#dfe3e9;display:flex;align-items:center;gap:10px;
  }
  .hero h1 .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 0 4px rgba(84,181,133,.12);flex:0 0 auto;}
  .summary{
    margin-top:7px;font-size:clamp(14px,1.6vw,17px);color:var(--text-dim);
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .summary b{color:var(--text);font-weight:600;}
  .summary .sep{color:var(--text-faint);margin:0 8px;}
  .refresh{
    flex:0 0 auto;display:flex;align-items:center;gap:8px;
    padding:9px 14px;border:1px solid var(--border);border-radius:10px;
    background:var(--surface);color:var(--text-dim);font-size:15px;font-weight:550;white-space:nowrap;
    transition:border-color .2s var(--ease),color .2s var(--ease),background .2s var(--ease);
    min-height:46px;
  }
  .refresh:hover{border-color:#33373d;color:var(--text);background:var(--surface-2);}
  .refresh svg{width:17px;height:17px;}
  .refresh.spin svg{animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .grid{
    flex:1 1 auto;min-height:0;display:grid;gap:14px;
    grid-auto-rows:1fr;
  }

  /* ---- 카드 공통 ---- */
  .card{
    position:relative;background:var(--surface);border:1px solid var(--border);
    border-radius:var(--radius);padding:18px 18px 16px;min-height:0;overflow:hidden;
    display:flex;flex-direction:column;gap:11px;text-align:left;width:100%;
    transition:transform .18s var(--ease),border-color .18s var(--ease),background .18s var(--ease);
  }
  .card:hover{border-color:#363b42;background:#171a1d;transform:translateY(-2px);}
  .card:active{transform:translateY(0);}
  .card-head{display:flex;align-items:flex-start;gap:10px;}
  .card-title{
    margin:0;font-size:clamp(18px,2.1vw,22px);font-weight:640;color:#e2e6ec;
    letter-spacing:-.01em;line-height:1.3;min-width:0;flex:1;
    overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  }
  .ver{
    flex:0 0 auto;font-size:13.5px;font-weight:600;letter-spacing:.01em;
    padding:4px 10px;border-radius:7px;background:rgba(91,141,239,.12);
    color:#8fb0f3;border:1px solid rgba(91,141,239,.22);font-variant-numeric:tabular-nums;
  }
  .stat-row{display:flex;flex-wrap:wrap;gap:8px;}
  .stat{
    display:inline-flex;align-items:center;gap:6px;
    padding:5px 10px;border-radius:8px;background:var(--surface-2);
    border:1px solid var(--border-soft);font-size:14.5px;font-weight:550;color:var(--text-dim);
    white-space:nowrap;
  }
  .stat b{font-weight:680;font-variant-numeric:tabular-nums;}
  .stat.red b{color:var(--red);} .stat.amber b{color:var(--amber);}
  .stat.green b{color:var(--green);} .stat.blue b{color:var(--blue);}
  .stat .ic{font-size:12px;line-height:1;}

  /* 깔끔한 수치 타일 (카드 핵심 지표) */
  .tiles{display:flex;gap:10px;flex-wrap:wrap;}
  .tile{flex:1 1 0;min-width:78px;background:var(--bg-2);border:1px solid var(--border-soft);
    border-radius:11px;padding:12px 13px;display:flex;flex-direction:column;gap:5px;}
  .tile .tn{font-size:clamp(22px,2.6vw,28px);font-weight:700;font-variant-numeric:tabular-nums;
    line-height:1;letter-spacing:-.02em;color:var(--text);}
  .tile .tl{font-size:13px;color:var(--text-faint);font-weight:550;white-space:nowrap;}
  .tile.red .tn{color:var(--red);} .tile.amber .tn{color:var(--amber);}
  .tile.green .tn{color:var(--green);} .tile.blue .tn{color:var(--blue);}
  .card-foot{
    margin-top:auto;padding-top:4px;display:flex;align-items:center;justify-content:space-between;
    font-size:13.5px;color:var(--text-faint);
  }
  .card-foot .enter{display:inline-flex;align-items:center;gap:4px;color:var(--text-dim);}

  /* 요약 카드(급한 것 / 최근 활동) 미니 리스트 */
  .mini{display:flex;flex-direction:column;gap:7px;min-height:0;overflow:hidden;}
  .mini-item{
    display:flex;gap:10px;align-items:center;font-size:14.5px;line-height:1.5;
    padding-bottom:9px;border-bottom:1px solid var(--border-soft);
  }
  .mini-item:last-child{border-bottom:none;}
  .mini-item .mk{flex:0 0 auto;font-size:13px;color:var(--text-faint);font-variant-numeric:tabular-nums;width:42px;}
  .mini-item .mt{min-width:0;flex:1;color:var(--text-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .mini-item .mp{flex:0 0 auto;font-size:12.5px;color:var(--text-faint);
    padding:1px 6px;border-radius:5px;background:var(--surface-2);border:1px solid var(--border-soft);}
  .card.accent-red{border-color:rgba(224,98,94,.28);}
  .card.accent-red .card-title{color:#f0b4b1;}
  .card.accent-amber{border-color:rgba(217,164,65,.22);}

  /* ============ 상세 (스크롤 허용) ============ */
  .detail{
    position:absolute;inset:0;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;
    padding:calc(var(--sat)) calc(var(--sar)) calc(var(--sab) + 40px) calc(var(--sal));
  }
  .detail-bar{
    position:sticky;top:0;z-index:5;
    background:rgba(11,12,14,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-bottom:1px solid var(--border-soft);
    padding:calc(var(--sat) + 12px) 22px 12px;display:flex;align-items:center;gap:14px;
  }
  .back{
    display:inline-flex;align-items:center;gap:7px;padding:9px 14px 9px 11px;
    border:1px solid var(--border);border-radius:10px;background:var(--surface);
    font-size:15px;font-weight:550;color:var(--text-dim);min-height:46px;
    transition:border-color .2s,color .2s,background .2s;
  }
  .back:hover{border-color:#363b42;color:var(--text);background:var(--surface-2);}
  .back svg{width:18px;height:18px;}
  .detail-bar .dh{min-width:0;}
  .detail-bar .dh h2{margin:0;font-size:20px;font-weight:650;color:#e2e6ec;letter-spacing:-.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .detail-bar .dh .dsub{font-size:14px;color:var(--text-faint);margin-top:1px;}

  .detail-body{max-width:980px;margin:0 auto;padding:22px;display:flex;flex-direction:column;gap:18px;}

  .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .section-head{
    display:flex;align-items:center;gap:9px;padding:15px 20px;
    font-size:16px;font-weight:640;color:#dfe3e9;letter-spacing:-.005em;
    border-bottom:1px solid var(--border-soft);
  }
  .section-head .cnt{font-size:13px;font-weight:600;color:var(--text-faint);
    background:var(--surface-2);border:1px solid var(--border-soft);padding:2px 9px;border-radius:20px;
    font-variant-numeric:tabular-nums;margin-left:auto;}
  .section-body{padding:8px 20px 18px;}

  .row{padding:13px 0;border-bottom:1px solid var(--border-soft);font-size:15.5px;line-height:1.65;color:var(--text);}
  .row:last-child{border-bottom:none;}
  .row .src{display:inline-block;margin-top:6px;font-size:12.5px;color:var(--text-faint);
    background:var(--bg-2);border:1px solid var(--border-soft);padding:1px 7px;border-radius:5px;}
  .row.thread{display:flex;gap:11px;}
  .row.thread .bullet{flex:0 0 auto;color:var(--red);font-size:9px;margin-top:7px;}
  .row.next{display:flex;gap:11px;}
  .row.next .bullet{flex:0 0 auto;color:var(--blue);font-weight:700;}
  .row b,.row strong{color:#e6eaef;font-weight:640;}
  .pname{font-size:13px;color:var(--blue);font-weight:600;margin-right:7px;}

  /* TODO */
  .progress{height:8px;border-radius:6px;background:var(--bg-2);overflow:hidden;display:flex;margin:6px 0 16px;border:1px solid var(--border-soft);}
  .progress i{display:block;height:100%;}
  .progress .pdone{background:var(--green);} .progress .pprog{background:var(--blue);} 
  .todo-group{margin-bottom:14px;}
  .todo-group:last-child{margin-bottom:0;}
  .todo-glabel{font-size:13px;font-weight:650;text-transform:uppercase;letter-spacing:.04em;color:var(--text-faint);margin-bottom:8px;}
  .todo-item{display:flex;gap:10px;align-items:baseline;padding:7px 0;font-size:15px;line-height:1.55;color:var(--text);}
  .todo-item .box{flex:0 0 auto;width:17px;height:17px;border-radius:4px;border:1.5px solid var(--border);margin-top:2px;
    display:flex;align-items:center;justify-content:center;font-size:11px;}
  .todo-item.done{color:var(--text-faint);text-decoration:line-through;text-decoration-color:#444a51;}
  .todo-item.done .box{background:rgba(84,181,133,.16);border-color:rgba(84,181,133,.4);color:var(--green);}
  .todo-item.prog .box{border-color:rgba(91,141,239,.5);color:var(--blue);}

  /* chips (known issues counts) */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:9px;
    background:var(--surface-2);border:1px solid var(--border-soft);font-size:14.5px;font-weight:550;color:var(--text-dim);}
  .chip b{font-variant-numeric:tabular-nums;font-weight:680;}
  .chip.fixed b{color:var(--green);} .chip.watch b{color:var(--amber);} .chip.na b{color:var(--text-faint);}
  .issue{display:flex;gap:11px;align-items:baseline;padding:10px 0;border-bottom:1px solid var(--border-soft);}
  .issue:last-child{border-bottom:none;}
  .issue .tag{flex:0 0 auto;font-size:12.5px;font-weight:650;color:var(--amber);background:rgba(217,164,65,.1);
    border:1px solid rgba(217,164,65,.22);padding:2px 8px;border-radius:6px;font-variant-numeric:tabular-nums;}
  .issue .it{min-width:0;}
  .issue .it .ittl{font-size:15px;color:var(--text);line-height:1.5;}
  .issue .it .icat{font-size:12.5px;color:var(--text-faint);margin-top:3px;}

  /* changelog */
  .cl{padding:14px 0;border-bottom:1px solid var(--border-soft);}
  .cl:last-child{border-bottom:none;}
  .cl-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
  .cl-head .clv{font-size:13.5px;font-weight:650;color:#8fb0f3;background:rgba(91,141,239,.1);
    border:1px solid rgba(91,141,239,.22);padding:2px 10px;border-radius:7px;font-variant-numeric:tabular-nums;}
  .cl-head .cld{font-size:13px;color:var(--text-faint);font-variant-numeric:tabular-nums;}
  .cl-sum{font-size:15px;color:var(--text-dim);line-height:1.6;margin-bottom:9px;}
  .cl-bullets{display:flex;flex-direction:column;gap:10px;}
  .cl-bullets .b{display:flex;gap:9px;font-size:15px;line-height:1.65;color:var(--text);}
  .cl-bullets .b .bd{color:var(--blue);flex:0 0 auto;font-size:8px;margin-top:8px;}

  /* sessions (접이식) */
  .sess{border-bottom:1px solid var(--border-soft);}
  .sess:last-child{border-bottom:none;}
  .sess-sum{display:flex;align-items:flex-start;gap:12px;padding:13px 0;width:100%;text-align:left;}
  .sess-sum .sd{flex:0 0 auto;font-size:13px;color:var(--text-faint);font-variant-numeric:tabular-nums;
    background:var(--bg-2);border:1px solid var(--border-soft);padding:3px 9px;border-radius:6px;margin-top:1px;}
  .sess-sum .st{min-width:0;flex:1;font-size:15.5px;color:var(--text);line-height:1.55;}
  .sess-sum .caret{flex:0 0 auto;color:var(--text-faint);transition:transform .2s var(--ease);margin-top:3px;}
  .sess.open .caret{transform:rotate(90deg);}
  .sess-detail{overflow:hidden;max-height:0;transition:max-height .28s var(--ease);}
  .sess.open .sess-detail{max-height:1400px;}
  .sess-inner{padding:2px 0 16px 0;display:flex;flex-direction:column;gap:13px;}
  .sub-label{font-size:12.5px;font-weight:650;text-transform:uppercase;letter-spacing:.04em;color:var(--text-faint);margin-bottom:8px;}
  .sub-list .si{display:flex;gap:9px;font-size:14.5px;line-height:1.65;color:var(--text-dim);padding:5px 0;}
  .sub-list .si .sb{flex:0 0 auto;font-size:8px;margin-top:7px;}
  .sub-list.what .sb{color:var(--green);} .sub-list.dec .sb{color:var(--amber);}

  /* pkm / deliverables */
  .pkm-item{padding:11px 0;border-bottom:1px solid var(--border-soft);}
  .pkm-item:last-child{border-bottom:none;}
  .pkm-item .ph{display:flex;align-items:center;gap:9px;}
  .pkm-item .pt{font-size:15px;font-weight:600;color:#dde1e7;}
  .pkm-item .pst{font-size:12px;color:var(--green);background:rgba(84,181,133,.1);
    border:1px solid rgba(84,181,133,.22);padding:1px 9px;border-radius:20px;font-weight:600;}
  .pkm-item .psum{font-size:14px;color:var(--text-dim);margin-top:5px;line-height:1.55;}
  .deliv{display:flex;gap:11px;align-items:baseline;padding:9px 0;border-bottom:1px solid var(--border-soft);}
  .deliv:last-child{border-bottom:none;}
  .deliv .dvd{flex:0 0 auto;font-size:13px;color:var(--text-faint);font-variant-numeric:tabular-nums;width:88px;}
  .deliv .dvt{font-size:15px;color:var(--text);}

  /* 빈/에러 상태 */
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;gap:14px;text-align:center;padding:40px;}
  .empty .eic{font-size:34px;}
  .empty h2{margin:0;font-size:18px;color:#dfe3e9;font-weight:620;}
  .empty p{margin:0;font-size:13.5px;color:var(--text-dim);max-width:340px;line-height:1.6;}
  .empty button{margin-top:6px;padding:11px 20px;border:1px solid var(--border);border-radius:10px;
    background:var(--surface);color:var(--text);font-size:13.5px;font-weight:550;}
  .empty button:hover{background:var(--surface-2);border-color:#363b42;}

  /* 전환: 자식 콘텐츠만 부드럽게 (뷰 전체 opacity:0 금지 — 미표시 방지) */
  .section{animation:fadeUp .28s var(--ease) both;}
  @keyframes fadeUp{from{transform:translateY(7px);}to{transform:translateY(0);}}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important;transition-duration:.001ms !important;}
    .sess-detail{transition:none;}
  }

  /* 폰: 홈은 여전히 무스크롤 (세로 우선) */
  @media (max-width:560px){
    .home{padding:calc(var(--sat) + 14px) calc(var(--sar) + 14px) calc(var(--sab) + 14px) calc(var(--sal) + 14px);gap:13px;}
    .hero{gap:10px;}
    .refresh{padding:9px 11px;}
    .refresh .rtxt{display:none;}
    .card{padding:14px 14px 12px;gap:9px;border-radius:12px;}
    .detail-body{padding:16px;}
    .summary{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  }
  @media (max-width:380px){
    body{font-size:14px;}
  }
</style>
</head>
<body>
<div id="app"><div class="empty"><div class="eic">⏳</div><p>불러오는 중…</p></div></div>

<script>
"use strict";

/* ============================================================
   대시보드_AI_작업현황 — 단일 자립형 뷰
   백엔드가 생성한 ./data.json 을 읽어 보여주기만 함.
   실패 시 내장 SAMPLE 로 폴백.
   ============================================================ */

/* ---- 내장 SAMPLE (실제 data.json 형식 그대로) ---- */
const SAMPLE = {
  "generatedAt": "2026-06-19T01:10:52.703Z",
  "projects": [
    {
      "id": "survey-011","name":"survey-011","version":"0.14.0",
      "roadmap":"survey-011 개선 로드맵 — v0.4.1~v0.12.0 배포 완료(v0.12.0: 입력장치 CATEGORY 배지[출력토글 삭제·echoCancellation 항상ON·IOS-5 PWA종결], 알람팝업 라벨/샘…",
      "changelog":[
        {"version":"0.14.0","date":"2026-06-18","summary":"v0.13.0 실기기 테스트 로그 분석 + 음성 클립 직접 청취 결과와 현장 피드백을 반영했습니다.",

// HTML 이스케이프 (XSS 방지)
function esc(s){
  return String(s==null?"":s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

// 마크다운 잔재 정리 → 안전한 HTML(굵게만 허용)
function clean(raw, opts){
  opts = opts || {};
  let s = String(raw==null?"":raw);
  // 블록인용 / callout 마커 제거
  s = s.replace(/^\s*>\s?/,"").replace(/\[!\w+\]\s*/g,"");
  // 줄 맨 앞 체크박스 토큰 제거: [ ] [x] [X]
  s = s.replace(/^\s*\[[ xX]\]\s*/,"");
  // 줄 맨 앞 라벨 토큰 제거: **(A)** **(B 클립소실)**
  s = s.replace(/^\s*\*\*\([^)]*\)\*\*\s*/,"");
  // 위키링크 [[텍스트]] → 텍스트
  s = s.replace(/\[\[([^\]]+)\]\]/g,"$1");
  // 백틱 코드 표시 제거
  s = s.replace(/`([^`]*)`/g,"$1");
  s = s.trim();
  // 이스케이프 후 굵게만 복원
  let out = esc(s).replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>");
  return out;
}

// ISO → 한국어 날짜시각
function fmtDateTime(iso){
  const d = new Date(iso); if(isNaN(d)) return String(iso||"");
  const wd=["일","월","화","수","목","금","토"][d.getDay()];
  const h=d.getHours(), m=d.getMinutes();
  const ap=h<12?"오전":"오후"; let hh=h%12; if(hh===0)hh=12;
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${wd}) ${ap} ${hh}:${String(m).padStart(2,"0")}`;
}
// YYYY-MM-DD → 사람이 읽는 짧은 형식
function fmtDate(s){
  if(!s) return "";
  const m=String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return String(s);
  return `${+m[2]}/${+m[3]}`;
}
function fmtDateLong(s){
  if(!s) return "";
  const m=String(s).match(/^(\d{4})-(\d{2})-(\d{2})/);
  if(!m) return String(s);
  return `${m[1]}.${m[2]}.${m[3]}`;
}

function el(html){ const t=document.createElement("template"); t.innerHTML=html.trim(); return t.content.firstElementChild; }

async function load(){
  try{
    const res = await fetch('./data.json?t='+Date.now(), {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    DATA = await res.json();
  }catch(e){
    // 폴백: 미리보기/오프라인에서도 렌더되게
    DATA = SAMPLE;
  }
  renderHome();
}

/* ============== 집계 ============== */
function allOpenThreads(){
  const out=[];
  (DATA.projects||[]).forEach(p=>(p.openThreads||[]).forEach(t=>out.push({project:p.name,text:t.text,source:t.source})));
  out.sort((a,b)=> String(b.source||"").localeCompare(String(a.source||"")));
  return out;
}
function allSessions(){
  const out=[];
  (DATA.projects||[]).forEach(p=>(p.sessions||[]).forEach(s=>out.push({project:p.name,date:s.date,theme:s.theme,whatWeDid:s.whatWeDid,decisions:s.decisions})));
  out.sort((a,b)=> String(b.date||"").localeCompare(String(a.date||"")));
  return out;
}

          ${top.map(s=>`<div class="mini-item"><span class="mk">${esc(fmtDate(s.date))}</span><span class="mt">${clean(s.theme)}</span></div>`).join('')}
        </div>
        <div class="card-foot"><span>타임라인 보기</span><span class="enter">상세 →</span></div>
      </button>`);
    grid.appendChild(card);
  }

  home.appendChild(grid);
  app.innerHTML="";
  app.appendChild(home);

  // 그리드 열 수를 화면에 맞춰 조정 (무스크롤 유지)
  layoutGrid(grid);

  // 이벤트
  $("#refreshBtn").addEventListener("click",(e)=>{
    const b=e.currentTarget; b.classList.add("spin");
    load().then(()=>{ /* 재렌더 시 새 버튼이라 자동 해제 */ });
  });
  grid.querySelectorAll("[data-go]").forEach(c=>{
    c.addEventListener("click",()=>{
      const go=c.getAttribute("data-go");
      if(go==="project") renderDetail("project", c.getAttribute("data-id"));
      else renderDetail(go);
    });
  });
}

// 카드 수·화면 폭에 따라 그리드 열 수 결정
function layoutGrid(grid){
  const n=grid.children.length;
  const w=window.innerWidth;
  let cols;
  if(w<=560)            cols = (n<=1?1:2);          // 폰: 2열
  else if(w<=900)       cols = Math.min(n,2);       // 태블릿
  else if(w<=1280)      cols = Math.min(n,3);       // 작은 노트북
  else                  cols = Math.min(n,4);       // 넓은 화면
  // 2x2 형태가 더 보기 좋은 4카드 데스크탑은 2~3열로 균형
  if(w>900 && n===4) cols = (w>1280?2:2);
  if(w>1280 && n===4) cols = 2;
  grid.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
}

/* ============== 상세 렌더 ============== */
function sectionEl(icon,title,count,bodyHTML){
  return `<div class="section">
    <div class="section-head">${icon} ${esc(title)}${count!=null?`<span class="cnt">${count}</span>`:''}</div>
    <div class="section-body">${bodyHTML}</div></div>`;
}

function renderDetail(type, id){
  let title="", sub="", body="";

  if(type==="project"){
    const p=(DATA.projects||[]).find(x=>x.id===id);
    if(!p){ renderHome(); return; }
    title=p.name; sub=p.version?('버전 v'+p.version):'';
    body=projectSections(p);
  } else if(type==="urgent"){
    title="🔴 지금 급한 것"; const list=allOpenThreads(); sub=`미해결 ${list.length}건`;
    body = sectionEl("","전체 미해결 / 실기기 대기", list.length,
      list.map(t=>`<div class="row thread"><span class="bullet">●</span><div><span class="pname">${esc(t.project)}</span>${clean(t.text)}${t.source?`<br><span class="src">${esc(fmtDateLong(t.source))}</span>`:''}</div></div>`).join('') || emptyRow());
  } else if(type==="recent"){
    title="🕑 최근 활동"; const list=allSessions(); sub=`세션 ${list.length}건`;
    body = `<div class="section"><div class="section-head">🕑 통합 세션 타임라인<span class="cnt">${list.length}</span></div><div class="section-body">${sessionsHTML(list,true)}</div></div>`;
  }

  const detail=el(`<div class="detail"></div>`);
  detail.innerHTML=`
    <div class="detail-bar">
      <button class="back" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
        홈
      </button>
      <div class="dh"><h2>${esc(title)}</h2>${sub?`<div class="dsub">${esc(sub)}</div>`:''}</div>
    </div>
    <div class="detail-body">${body}</div>`;
  app.innerHTML="";
  app.appendChild(detail);

  $("#backBtn").addEventListener("click",renderHome);
  // 세션 접이식
  bindSessions(detail);
}

function emptyRow(){ return `<div class="row" style="color:var(--text-faint)">항목이 없습니다.</div>`; }

// 프로젝트 상세 — 있는 섹션만
function projectSections(p){
  let out="";

  // ▶ 다음 시작점
  if(p.nextSteps&&p.nextSteps.length){
    out+=sectionEl("▶","다음 시작점",p.nextSteps.length,
      p.nextSteps.map(s=>`<div class="row next"><span class="bullet">▶</span><div>${clean(s.text)}${s.source?`<br><span class="src">${esc(fmtDateLong(s.source))}</span>`:''}</div></div>`).join(''));
  }
  // 🔴 미해결
  if(p.openThreads&&p.openThreads.length){
    out+=sectionEl("🔴","미해결 / 실기기 대기",p.openThreads.length,
      p.openThreads.map(t=>`<div class="row thread"><span class="bullet">●</span><div>${clean(t.text)}${t.source?`<br><span class="src">${esc(fmtDateLong(t.source))}</span>`:''}</div></div>`).join(''));
  }
  // ✅ TODO 진행도
  if(p.todos && (p.todos.done||p.todos.inProgress||p.todos.pending)){
    const done=(p.todos.done||[]), prog=(p.todos.inProgress||[]), pend=(p.todos.pending||[]);
    const total=done.length+prog.length+pend.length;
    const pd= total?Math.round(done.length/total*100):0;
    const pp= total?Math.round(prog.length/total*100):0;
    let inner=`<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-dim);margin-top:6px">
        <span>완료 <b style="color:var(--green)">${done.length}</b> · 진행중 <b style="color:var(--blue)">${prog.length}</b> · 대기 <b style="color:var(--text-faint)">${pend.length}</b></span>
        <span style="color:var(--text-faint)">${pd}% 완료</span></div>
      <div class="progress"><i class="pdone" style="width:${pd}%"></i><i class="pprog" style="width:${pp}%"></i></div>`;
    const grp=(label,arr,cls)=> arr.length?`<div class="todo-group"><div class="todo-glabel">${label}</div>${
      arr.map(t=>`<div class="todo-item ${cls}"><span class="box">${cls==='done'?'✓':''}</span><span>${clean(t.text)}</span></div>`).join('')}</div>`:'';
    inner+= grp("진행중",prog,"prog")+grp("대기",pend,"")+grp("완료",done,"done");
    out+=sectionEl("✅","TODO 진행도",`${done.length}/${total}`,inner);
  }
  // 🐞 KNOWN-ISSUES
  if(p.knownIssues && p.knownIssues.counts){
    const c=p.knownIssues.counts, watch=p.knownIssues.watching||[];
    let inner=`<div class="chips">
      <span class="chip fixed">✅ 수정 <b>${c.fixed||0}</b></span>
      <span class="chip watch">⚠️ 주시 <b>${c.watching||0}</b></span>
      <span class="chip na">➖ 해당없음 <b>${c.na||0}</b></span></div>`;
    if(watch.length){
      inner+=watch.map(w=>`<div class="issue"><span class="tag">${esc(w.tag)}</span><div class="it"><div class="ittl">${clean(w.title)}</div>${w.category?`<div class="icat">${esc(w.category)}</div>`:''}</div></div>`).join('');
    }
    out+=sectionEl("🐞","KNOWN-ISSUES",null,inner);
  }
  // 📦 변경 내역
  if(p.changelog&&p.changelog.length){
    const inner=p.changelog.map(c=>`<div class="cl">
      <div class="cl-head"><span class="clv">v${esc(c.version)}</span><span class="cld">${esc(fmtDateLong(c.date))}</span></div>
      ${c.summary?`<div class="cl-sum">${clean(c.summary)}</div>`:''}
      ${(c.bullets&&c.bullets.length)?`<div class="cl-bullets">${c.bullets.map(b=>`<div class="b"><span class="bd">●</span><span>${clean(b)}</span></div>`).join('')}</div>`:''}
    </div>`).join('');
    out+=sectionEl("📦","변경 내역",p.changelog.length,inner);
  }
  // 🕑 세션 타임라인
  if(p.sessions&&p.sessions.length){
    out+=sectionEl("🕑","세션 타임라인",p.sessions.length,sessionsHTML(p.sessions,false));
  }
  // 📁 관련 PKM·산출물
  const goals=(p.pkm&&p.pkm.goals)||[], pkmProj=(p.pkm&&p.pkm.projects)||[], deliv=p.deliverables||[];
  if(goals.length||pkmProj.length||deliv.length){
    let inner="";
    const pkmItem=(x)=>`<div class="pkm-item"><div class="ph"><span class="pt">${esc(x.title)}</span>${x.status?`<span class="pst">${esc(x.status)}</span>`:''}</div>${x.summary?`<div class="psum">${clean(x.summary)}</div>`:''}</div>`;
    if(goals.length) inner+=`<div class="todo-glabel">목표</div>`+goals.map(pkmItem).join('');
    if(pkmProj.length) inner+=`<div class="todo-glabel" style="margin-top:12px">프로젝트</div>`+pkmProj.map(pkmItem).join('');
    if(deliv.length) inner+=`<div class="todo-glabel" style="margin-top:12px">산출물</div>`+deliv.map(d=>`<div class="deliv"><span class="dvd">${esc(fmtDateLong(d.date))}</span><span class="dvt">${clean(d.title)}</span></div>`).join('');
    out+=sectionEl("📁","관련 PKM·산출물",null,inner);
  }

  return out || `<div class="section"><div class="section-body"><div class="row" style="color:var(--text-faint)">표시할 상세 정보가 없습니다.</div></div></div>`;
}

// 세션 목록 HTML (showProject: 통합 타임라인이면 프로젝트명 표기)
function sessionsHTML(list, showProject){
  return list.map((s,i)=>`
    <div class="sess" data-sess>
      <button class="sess-sum" data-toggle>
        <span class="sd">${esc(fmtDateLong(s.date))}</span>
        <span class="st">${showProject?`<span class="pname">${esc(s.project)}</span>`:''}${clean(s.theme)}</span>
        <span class="caret"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></span>
      </button>
      <div class="sess-detail"><div class="sess-inner">
        ${(s.whatWeDid&&s.whatWeDid.length)?`<div><div class="sub-label">한 일</div><div class="sub-list what">${s.whatWeDid.map(w=>`<div class="si"><span class="sb">●</span><span>${clean(w)}</span></div>`).join('')}</div></div>`:''}
        ${(s.decisions&&s.decisions.length)?`<div><div class="sub-label">결정</div><div class="sub-list dec">${s.decisions.map(d=>`<div class="si"><span class="sb">◆</span><span>${clean(d)}</span></div>`).join('')}</div></div>`:''}
      </div></div>
    </div>`).join('');
}

function bindSessions(root){
  root.querySelectorAll("[data-toggle]").forEach(btn=>{
    btn.addEventListener("click",()=> btn.closest("[data-sess]").classList.toggle("open"));
  });
}

/* ============== 리사이즈 시 홈 그리드 재배치 ============== */
let rT;
window.addEventListener("resize",()=>{
  clearTimeout(rT);
  rT=setTimeout(()=>{ const g=document.getElementById("grid"); if(g) layoutGrid(g); },120);
});

/* ============== 시작 ============== */
load();
</script>
